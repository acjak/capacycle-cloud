# fly.toml — Capacycle Cloud
# Deploy: fly deploy --build-arg from parent dir context
# First time: fly launch, fly postgres create, fly secrets set ...

app = "cyclec-cloud"
primary_region = "arn"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/auth/me"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
